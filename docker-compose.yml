services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: payportal
      MYSQL_USER: payportal
      MYSQL_PASSWORD: payportal
      MYSQL_ROOT_PASSWORD: local-root-password
    ports:
      - "3306:3306"
    volumes:
      - payportal-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  payportal-mysql:
